{% extends "base/base.html" %}

{% block title %}
Delete Device
{% endblock %}

{% block content %}

<h1>Delete Device</h1>

<hr>

<h3>

Are you sure you want to delete

<strong>{{ device.name }}</strong> ?

</h3>

<form method="POST">

    {% csrf_token %}

    <button type="submit">

        Delete Device

    </button>

</form>

<br>

<a href="{% url 'device_list' %}">

Cancel

</a>

{% endblock %}
